workflows:
  android-release:
    name: VibeStudy Android Release
    max_build_duration: 60

    environment:
      flutter: 3.10.6
      java: 11

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build APK
        script: flutter build apk --release

    artifacts:
      - build/**/outputs/**/*.apk

    publishing:
      email:
        recipients:
          - s47918932@gmail.com
        notify:
          success: true
          failure: true
